name: Deploy NinKing Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract ninja data → embed into HTML
        run: python tools/extract_ninja_data.py docs/ninking/ninja_card_viewer.html

      - name: Extract xi data → embed into HTML
        run: python tools/extract_xi_data.py docs/ninking/ninja_card_viewer.html

      - name: Extract scene tree → embed into HTML
        run: python tools/tscn_parser.py docs/ninking/ninja_card_viewer.html

      - name: Inject recent commits into HTML
        run: python tools/inject_recent_updates.py docs/ninking/ninja_card_viewer.html

      - name: Copy card images into docs/ for Pages deployment
        run: mkdir -p docs/assets/images/cards/ninjas && cp -r assets/images/cards/ninjas/*.png docs/assets/images/cards/ninjas/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
