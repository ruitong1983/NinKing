const GROUP_ORDER = ['稳妥型','理财型','赌狗型','灵活型','收集型','感性型','混沌型'];

function flatten() {
  const r = [];
  for (const e of STRATEGY_DATA.mbti_types) {
    for (const [vk, v] of Object.entries(e.variants))
      r.push({ id:e.mbti+'-'+vk, name:v.name, mbti:e.mbti, variant:vk, group:e.group, icon:e.icon, description:v.description, params:v.params, baseName:e.name });
  }
  for (const b of STRATEGY_DATA.test_baselines||[])
    r.push({ id:b.id, name:b.name, mbti:null, variant:null, group:b.group, icon:b.icon, description:b.description, params:b.params, baseName:b.name });
  return r;
}
let ALL = flatten();

document.getElementById('typeCount').textContent = `共 ${ALL.length} 型 (32 MBTI-A/T + 3 基线)`;

let selectedId = null;

// ══════════════════════════════════════════
// 左侧栏
// ══════════════════════════════════════════
function renderSidebar(filter) {
  const list = document.getElementById('sidebarList');
  let html = '', totalShown = 0;

  for (const g of GROUP_ORDER) {
    const members = ALL.filter(p => p.group === g);
    const f = filter ? members.filter(p => p.name.includes(filter) || (p.mbti && p.mbti.includes(filter.toUpperCase()))) : members;
    if (!f.length) continue;
    const gi = STRATEGY_DATA.group_index[g]||{};
    html += `<div class="group-label">${gi.icon||GROUP_ICONS[g]||''} ${g} <span class="badge">${f.length}/${members.length}</span></div>`;
    for (const p of f) {
      totalShown++;
      const ac = selectedId===p.id ? 'active' : '';
      html += `<div class="type-item ${ac}" onclick="select('${p.id}')">`;
      html += `<span class="icon-symbol">${p.icon}</span>`;
      html += `<span class="name">${p.name}</span>`;
      if (p.mbti) { html += `<span class="mbti-tag">${p.mbti}</span><span class="variant-tag ${p.variant==='A'?'a':'t'}">${p.variant}</span>`; }
      else { html += `<span class="mbti-tag" style="color:#666;">基线</span>`; }
      html += `</div>`;
    }
  }
  list.innerHTML = totalShown ? html : `<div class="no-match">没有匹配 "${filter}"</div>`;
}

function filterList() { renderSidebar(document.getElementById('searchInput').value); }

// ══════════════════════════════════════════
// 选择
// ══════════════════════════════════════════
function select(id) {
  selectedId = id;
  renderSidebar(document.getElementById('searchInput').value);
  const p = ALL.find(x => x.id === id);
  if (p) renderDetail(p);
}

function renderDetail(p) {
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('detailArea').style.display = 'block';

  const isChaos = p.mbti===null;
  const vc = p.variant==='A'?'a':'t';
  const sibling = !isChaos ? ALL.find(x => x.mbti===p.mbti && x.variant!==p.variant) : null;

  let h = '';

  // Header
  h += `<div class="detail-header">`;
  h += `<div class="breadcrumb">${p.icon} ${p.group} / ${p.baseName||p.name}</div>`;
  h += `<div class="title-row">`;
  h += `<span class="icon-symbol">${p.icon}</span><h2>${p.name}</h2>`;
  if (p.mbti) {
    h += `<span class="mbti-badge">${p.mbti}</span>`;
    h += `<span class="variant-badge variant-tag ${vc}">${p.variant==='A'?'Assertive 自信':'Turbulent 动荡'}</span>`;
  }
  h += `</div><div class="desc">${p.description}</div></div>`;

  h += `<div class="detail-body">`;

  // Param cards
  h += `<div class="section-title">📊 8维决策参数</div>`;
  h += `<div class="param-grid">`;
  h += card('策略锁定', lockStr(p.params.strategy_lock), lockPct(p.params.strategy_lock), 0x42a5f5);
  h += card('策略纯度', (p.params.strategy_purity*100).toFixed(0)+'%', p.params.strategy_purity*100, 0x4caf50);
  h += card('预算比例', (p.params.budget_ratio*100).toFixed(0)+'%', Math.min(p.params.budget_ratio*100,100), 0xff9800);
  h += card('刷新倾向', REFRESH_LABELS[p.params.refresh_behavior]||p.params.refresh_behavior, REFRESH_ORDER.indexOf(p.params.refresh_behavior)/(REFRESH_ORDER.length-1)*100, 0xab47bc);
  h += card('经济偏好', ECON_LABELS[p.params.economy_preference]||p.params.economy_preference, ECON_ORDER.indexOf(p.params.economy_preference)/(ECON_ORDER.length-1)*100, 0x42a5f5);
  h += card('填坑策略', FILL_LABELS[p.params.fill_slots]||p.params.fill_slots, FILL_ORDER.indexOf(p.params.fill_slots)/(FILL_ORDER.length-1)*100, 0x4caf50);
  h += card('满5替换', p.params.replace_when_full?'✅ 会替换':'❌ 不替换', p.params.replace_when_full?100:0, 0xff9800);
  h += card('逆境搏命', desLabel(p.params.desperate_behavior), p.params.desperate_behavior?100:0, 0xf44336);
  h += `</div>`;

  // Specials
  const specs = [];
  if (p.params._pick_strategy) specs.push(`策略选取: ${p.params._pick_strategy}`);
  if (p.params._prefer_group_coverage) specs.push(`偏好阵容覆盖`);
  if (p.params._batch_replace_threshold) specs.push(`批量替换阈值: ${p.params._batch_replace_threshold}`);
  if (p.params._random_decisions) specs.push(`随机决策`);
  if (p.params._reverse_decisions) specs.push(`反向决策`);
  if (p.params._skip_shop) specs.push(`跳过商店`);
  if (specs.length) {
    h += `<div class="section-title">⚙️ 特殊参数</div>`;
    h += `<div class="specials-wrap">`;
    for (const s of specs) h += `<span class="specials-tag">${s}</span>`;
    h += `</div>`;
  }

  // Insight
  if (p.mbti) {
    const gm = ALL.filter(x => x.group===p.group && x.mbti!==null);
    const aB = avg(gm,'budget_ratio'), aP = avg(gm,'strategy_purity');
    let tempName='?';
    for (const [t,m] of Object.entries(TEMPERAMENTS)) { if (m.includes(p.mbti)) { tempName=t; break; } }

    h += `<div class="section-title">📋 类型解读</div>`;
    h += `<div class="insight-box">`;
    h += `<div><b>MBTI 气质：</b>${tempName}</div>`;
    h += `<div style="margin-top:6px;"><b>A/T 差异：</b>${p.variant==='A'?'自信型(Assertive) — 抗压性强，逆境不轻易改变策略，预算控制更紧':'动荡型(Turbulent) — 完美主义倾向，逆境易焦虑，会花更多钱买安全感'}</div>`;
    h += `<div style="margin-top:6px;"><b>与同组对比：</b></div>`;
    h += `<div style="display:flex;gap:20px;margin-top:4px;font-size:12px;color:#aaa;">`;
    h += `<span>纯度 ${p.variant==='A'?'📈':'📊'} ${(p.params.strategy_purity*100).toFixed(0)}% (组均 ${(aP*100).toFixed(0)}%)</span>`;
    h += `<span>预算 ${p.variant==='A'?'📉':'📈'} ${(p.params.budget_ratio*100).toFixed(0)}% (组均 ${(aB*100).toFixed(0)}%)</span>`;
    h += `</div></div>`;
  }

  // A/T对比
  if (sibling) {
    h += `<div class="section-title">⚖️ ${p.mbti} ${p.variant} vs ${sibling.variant}</div>`;
    h += `<table class="compare-table"><tr><th>参数</th><th>${p.name}</th><th>${sibling.name}</th><th>差异</th></tr>`;
    const cp = [
      {k:'strategy_purity',l:'纯度',f:v=>(v*100).toFixed(0)+'%'},
      {k:'budget_ratio',l:'预算',f:v=>(v*100).toFixed(0)+'%'},
      {k:'refresh_behavior',l:'刷新',f:v=>REFRESH_LABELS[v]||v},
      {k:'economy_preference',l:'经济',f:v=>ECON_LABELS[v]||v},
      {k:'fill_slots',l:'填坑',f:v=>FILL_LABELS[v]||v},
    ];
    for (const c of cp) {
      const cv=p.params[c.k], sv=sibling.params[c.k];
      let diff='';
      if (typeof cv==='number'&&typeof sv==='number') {
        const d=sv!==0?((cv-sv)/sv*100).toFixed(0):'∞';
        if (d>0) diff=`<span class="diff-pos">+${d}%</span>`;
        else if (d<0) diff=`<span class="diff-neg">${d}%</span>`;

      } else diff=cv!==sv?'<span style="color:#ff9800;">⇄</span>':'<span style="color:#888;">=</span>';
      h+=`<tr><td class="param-name">${c.l}</td><td>${c.f(cv)}</td><td>${c.f(sv)}</td><td>${diff}</td></tr>`;
    }
    h+=`</table>`;
  }

  h+=`</div>`;

  // ◀ 模拟结果插入
  const sim = SIM_RESULTS?.[p.name];
  if (sim) {
    h += renderSimulation(p, sim);
  }

  // ◀ 结论文本（每个类型都可见）
  h += renderConclusions();

  document.getElementById('detailArea').innerHTML = h;
}

// ══════════════════════════════════════════
// 模拟结果渲染
// ══════════════════════════════════════════
function renderSimulation(p, sim) {
  if (!sim) return '';
  let h = '';

  h += `<div class="section-title">🎮 模拟结果</div>`;

  // 4 个核心指标
  const b8color = sim.b8r >= 30 ? 'sim-pass' : sim.b8r >= 10 ? 'sim-warn' : 'sim-fail';
  const trColor = sim.at >= 80 ? 'sim-pass' : sim.at >= 60 ? 'sim-warn' : 'sim-fail';
  h += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">`;
  h += `<div class="sim-card"><div class="sim-label">B8通关率</div><div class="sim-value ${b8color}">${sim.b8r}%</div></div>`;
  h += `<div class="sim-card"><div class="sim-label">最高结界</div><div class="sim-value" style="color:${sim.mb>=8?'#4caf50':'#ff9800'}">B${sim.mb}</div></div>`;
  h += `<div class="sim-card"><div class="sim-label">忍者触发率</div><div class="sim-value ${trColor}">${sim.at}%</div></div>`;
  h += `<div class="sim-card"><div class="sim-label">平均活跃忍者</div><div class="sim-value" style="color:#42a5f5">${sim.aa.toFixed(1)}</div></div>`;
  h += `</div>`;

  // 结界通过率条
  h += `<div style="margin-bottom:16px;">`;
  h += `<div style="font-size:11px;color:#888;margin-bottom:4px;">每个结界通过率（B1→B8）</div>`;
  h += `<div class="sim-barrier-bar">`;
  for (let b = 1; b <= 8; b++) {
    const rate = sim.bp?.[String(b)] ?? 0;
    const cls = rate >= 60 ? 'pass' : rate >= 20 ? 'partial' : 'fail';
    h += `<div class="sim-barrier-cell ${cls}" title="B${b}: ${rate}%">${rate>0?rate+'%':'✗'}</div>`;
  }
  h += `</div></div>`;

  // B8得分
  if (sim.b8r > 0 && sim.b8p50 > 0) {
    h += `<div class="section-title" style="margin-top:0;">🏆 B8通关得分</div>`;
    h += `<div class="sim-score-grid">`;
    h += `<div class="sim-card"><div class="sim-label">P50中位数</div><div class="sim-value" style="color:#ffd700;font-size:16px;">${(sim.b8p50/1e6).toFixed(1)}M</div></div>`;
    h += `<div class="sim-card"><div class="sim-label">最低</div><div class="sim-value" style="color:#888;font-size:16px;">${(sim.b8min/1e6).toFixed(1)}M</div></div>`;
    h += `<div class="sim-card"><div class="sim-label">最高</div><div class="sim-value" style="color:#4caf50;font-size:16px;">${(sim.b8max/1e6).toFixed(1)}M</div></div>`;
    h += `</div>`;
  }

  return h;
}

function renderConclusions() {
  if (!SIM_CONCLUSIONS) return '';
  let h = `<div class="section-title">📈 模拟结论（全57型汇总）</div>`;
  h += `<div class="sim-conc">`;
  for (const line of SIM_CONCLUSIONS) {
    if (line === '') { h += `<br>`; continue; }
    if (line.startsWith('Top') || line.startsWith('A/T') || line.startsWith('组排名') || line.startsWith('核心发现')) {
      h += `<div class="conc-group">${line}</div>`;
    } else { h += `<div>${line}</div>`; }
  }
  h += `</div>`;
  return h;
}

// ── helpers ──
function card(label, val, pct, color) {
  const c = '#'+color.toString(16).padStart(6,'0');
  return `<div class="param-card"><div class="label">${label}</div><div class="value">${val}</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.max(0,Math.min(100,pct))}%;background:${c}"></div></div></div>`;
}
function lockStr(l) { return l===null?'无锁定':Array.isArray(l)?l.join('、')||'无锁定':String(l); }
function lockPct(l) { return l===null?0:Array.isArray(l)?Math.min(l.length/5*100,100):50; }
function desLabel(d) { return d?DESPERATE_LABELS[d]||d:'无'; }
function avg(arr,key) { return arr.length?arr.reduce((s,x)=>s+(x.params[key]||0),0)/arr.length:0; }

// ══════════════════════════════════════════
// 启动：渲染左侧栏
// ══════════════════════════════════════════
renderSidebar();
</script>
