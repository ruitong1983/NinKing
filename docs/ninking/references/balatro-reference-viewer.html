<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balatro 完整参考手册</title>
<style>
:root {
  --bg:#0f0f23; --card:#1a1a3e; --text:#e0e0e0; --border:#2a2a5a;
  --common:#8a8a8a; --uncommon:#4a90d9; --rare:#d94a4a; --legendary:#d98a1a;
  --chips:#3a7bd5; --mult:#d54040; --xmult:#b040d5; --economy:#40b540;
  --deck:#d5a040; --gen:#40a0d5; --control:#d57040; --retrigger:#b5408a;
  --special:#8a8a40; --copy:#d94a4a; --accent:#ffd93d;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background:var(--bg); color:var(--text); height:100vh; display:flex; overflow:hidden;
}

/* ===== Sidebar ===== */
.sidebar {
  width:200px; flex-shrink:0; background:var(--card); border-right:1px solid var(--border);
  display:flex; flex-direction:column; height:100vh;
}
.sb-header {
  padding:16px 14px 12px; text-align:center; border-bottom:1px solid var(--border); flex-shrink:0;
}
.sb-header h2 { font-size:1em; background:linear-gradient(135deg,#ff6b6b,#ffd93d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sb-header .sb-sub { font-size:.65em; color:#555; margin-top:2px; }
.sb-nav { flex:1; overflow-y:auto; padding:6px 0; }
.sb-nav::-webkit-scrollbar { width:3px; }
.sb-nav::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.sb-item {
  display:flex; align-items:center; gap:8px; padding:9px 14px; cursor:pointer; color:#888;
  font-size:.8em; transition:.15s; border-left:3px solid transparent; user-select:none;
}
.sb-item:hover { background:rgba(255,255,255,.04); color:#ccc; }
.sb-item.active { color:var(--accent); border-left-color:var(--accent); background:rgba(255,217,61,.06); }
.sb-item .sb-count { margin-left:auto; font-size:.75em; color:#444; }
.sb-divider { height:1px; background:var(--border); margin:4px 14px; }

/* ===== Main ===== */
.main {
  flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0;
}
.main-header {
  padding:14px 24px; border-bottom:1px solid var(--border); flex-shrink:0;
  background:var(--bg);
}
.main-header h1 { font-size:1.4em; }
.main-header .sub { font-size:.75em; color:#666; margin-top:2px; }
.main-body {
  flex:1; overflow-y:auto; padding:20px 24px 40px;
}
.main-body::-webkit-scrollbar { width:6px; }
.main-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ===== View: hidden by default ===== */
.view { display:none; }
.view.active { display:block; }

/* ===== Joker filters ===== */
.filters {
  display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; padding:8px 12px;
  background:var(--card); border-radius:8px; border:1px solid var(--border);
}
.filters .f-btn {
  padding:3px 12px; border-radius:16px; border:1px solid #444; background:transparent;
  color:var(--text); cursor:pointer; font-size:.78em; transition:.15s;
}
.filters .f-btn:hover { border-color:#fff; }
.filters .f-btn.on { background:#555; border-color:#555; }
.filters input {
  margin-left:auto; padding:3px 10px; border-radius:16px; border:1px solid #444;
  background:var(--bg); color:var(--text); font-size:.78em; width:140px;
}

/* ===== Card grid ===== */
.grid {
  display:grid; gap:8px;
}
.grid.cols-3 { grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); }
.grid.cols-2 { grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); }
.grid.cols-1 { grid-template-columns:1fr; }
.c {
  background:var(--card); border-radius:8px; padding:12px 14px; border-left:3px solid #555;
  transition:.15s; position:relative; overflow:hidden;
}
.c:hover { transform:translateY(-1px); box-shadow:0 3px 12px rgba(0,0,0,.3); }
.c .r-tag { position:absolute; top:0; right:0; padding:1px 8px; font-size:.65em; border-radius:0 8px 0 6px; }
.c .nm { font-size:.95em; font-weight:bold; margin-bottom:3px; }
.c .eff { font-size:.8em; color:#bbb; line-height:1.4; }
.c .meta { display:flex; gap:10px; margin-top:5px; font-size:.72em; color:#777; }
.c .meta .price { color:var(--economy); }
.c.common { border-left-color:var(--common); } .c.uncommon { border-left-color:var(--uncommon); }
.c.rare { border-left-color:var(--rare); } .c.legendary { border-left-color:var(--legendary); }
.r-tag.common { background:var(--common); } .r-tag.uncommon { background:var(--uncommon); }
.r-tag.rare { background:var(--rare); } .r-tag.legendary { background:var(--legendary); }
.r-tag { color:#fff; }

/* ===== Planet cards ===== */
.p-card {
  background:var(--card); border-radius:8px; padding:12px 14px; border-left:3px solid var(--chips);
  cursor:pointer; transition:.15s;
}
.p-card:hover { transform:translateY(-1px); box-shadow:0 3px 12px rgba(0,0,0,.3); border-left-color:var(--economy); }
.p-card .pn { font-weight:bold; font-size:.95em; }
.p-card .pf { font-size:.8em; color:#aaa; margin-top:3px; }
.p-card .pl { font-size:.76em; color:#777; margin-top:2px; }
.p-card .ph { font-size:.68em; color:#444; margin-top:4px; }

/* ===== Modal ===== */
.modal {
  display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,.7);
  backdrop-filter:blur(3px); justify-content:center; align-items:center;
}
.modal.show { display:flex; }
.modal-bx {
  background:var(--card); border-radius:12px; padding:24px 28px; max-width:650px; width:90%;
  max-height:80vh; overflow-y:auto; border:1px solid var(--border); position:relative;
}
.modal-bx .close { position:absolute; top:10px; right:14px; font-size:1.4em; cursor:pointer; color:#888; }
.modal-bx .close:hover { color:#fff; }
.modal-bx h2 { font-size:1.3em; margin-bottom:2px; }
.modal-bx .ms { color:#888; font-size:.85em; margin-bottom:14px; }
.modal-bx table.lvt { width:100%; border-collapse:collapse; margin:10px 0 14px; font-size:.85em; }
.modal-bx table.lvt th { background:var(--bg); padding:5px 8px; font-size:.82em; }
.modal-bx table.lvt td { padding:4px 8px; text-align:center; border-bottom:1px solid var(--border); }
.modal-bx table.lvt tr.hl { background:rgba(255,217,61,.07); }
.modal-bx .rl { color:var(--accent); margin:12px 0 6px; font-size:.92em; }
.modal-bx .rt { display:flex; flex-wrap:wrap; gap:5px; }
.modal-bx .rt span {
  padding:2px 8px; border-radius:10px; font-size:.74em; cursor:pointer;
  background:var(--bg); border:1px solid var(--border); transition:.15s;
}
.modal-bx .rt span:hover { border-color:var(--accent); color:var(--accent); }

/* ===== Table for boss/economy ===== */
.tbl-wrap { overflow-x:auto; }
table.tbl { width:100%; border-collapse:collapse; font-size:.82em; }
table.tbl th, table.tbl td { padding:6px 10px; text-align:left; border-bottom:1px solid var(--border); }
table.tbl th { background:var(--card); color:var(--accent); font-weight:600; position:sticky; top:0; }

@media(max-width:768px) {
  .sidebar { width:160px; }
  .grid.cols-3 { grid-template-columns:1fr; }
  .grid.cols-2 { grid-template-columns:1fr; }
  .main-body { padding:12px 14px; }
  .filters input { width:100px; }
}
</style>

// View title map
const viewMeta = {};
sections.forEach(s => { if (s.id) viewMeta[s.id] = s; });

let currentView = 'jokers';

function switchView(id) {
  currentView = id;
  // sidebar highlight
  document.querySelectorAll('.sb-item').forEach(el => el.classList.toggle('active', el.dataset.section === id));
  // update header
  const meta = viewMeta[id];
  document.getElementById('viewTitle').textContent = `${meta.icon} ${meta.label}`;
  document.getElementById('viewSub').textContent = meta.count ? `${meta.count} 项 · 点击卡牌查看详情` : '点击卡牌查看详情';
  // render
  const c = document.getElementById('viewContainer');
  c.innerHTML = '';
  const fn = 'render_' + id;
  if (typeof window[fn] === 'function') window[fn](c);
  c.scrollTop = 0;
}

function render_jokers(container) {
  // filters
  const filters = document.createElement('div'); filters.className='filters';
  const qAll = mkBtn('全部', 'q-all', true, filters);
  const qs = ['common','uncommon','rare','legendary'];
  const qLabels = {common:'普通', uncommon:'罕见', rare:'稀有', legendary:'传奇'};
  const qBtns = qs.map(q => mkBtn(qLabels[q], 'q-'+q, true, filters));
  const gap = document.createElement('span'); gap.style.cssText='color:#444;font-size:.78em;margin:0 0 0 10px;'; gap.textContent='分类:';
  filters.appendChild(gap);
  const cAll = mkBtn('全部', 'c-all', true, filters);
  const cats = ['chips','mult','xmult','economy','deck','gen','control','retrigger','special','copy'];
  const cBtns = cats.map(c => mkBtn(CATS[c], 'c-'+c, false, filters));
  const search = document.createElement('input');
  search.placeholder = '🔍 搜索...';
  filters.appendChild(search);
  container.appendChild(filters);

  const grid = document.createElement('div'); grid.className='grid cols-3';
  container.appendChild(grid);

  function render() {
    const sq = search.value.toLowerCase();
    const qSet = new Set(); qBtns.forEach(b => { if (b.classList.contains('on')) qSet.add(b.dd.split('-')[1]); });
    const cSet = new Set(); cBtns.forEach(b => { if (b.classList.contains('on')) cSet.add(b.dd.split('-')[1]); });
    if (qAll.classList.contains('on')) qSet.clear();
    if (cAll.classList.contains('on')) cSet.clear();
    grid.innerHTML = JOKERS.map(j => {
      if (qSet.size && !qSet.has(j.q)) return '';
      if (cSet.size && !cSet.has(j.c)) return '';
      if (sq && !(j.n.includes(sq) || j.e.includes(sq))) return '';
      return `<div class="c ${j.q}"><span class="r-tag ${j.q}">${rL[j.q]}</span>
        <div class="nm">${j.n}</div><div class="eff">${j.e}</div>
        <div class="meta">${j.p ? `<span class="price">💰 ${j.p}</span>` : ''}</div></div>`;
    }).join('');
  }

  filters.querySelectorAll('.f-btn').forEach(b => {
    b.addEventListener('click', () => {
      if (b.dd === 'q-all') { qBtns.forEach(bb => bb.classList.remove('on')); b.classList.add('on'); }
      else if (b.dd === 'c-all') { cBtns.forEach(bb => bb.classList.remove('on')); b.classList.add('on'); }
      else if (b.dd.startsWith('q-')) { qAll.classList.remove('on'); b.classList.toggle('on'); if (!qBtns.some(bb => bb.classList.contains('on'))) qAll.classList.add('on'); }
      else if (b.dd.startsWith('c-')) { cAll.classList.remove('on'); b.classList.toggle('on'); if (!cBtns.some(bb => bb.classList.contains('on'))) cAll.classList.add('on'); }
      render();
    });
  });
  search.addEventListener('input', render);
  render();
}

function mkBtn(label, dd, on, parent) {
  const b = document.createElement('button'); b.className='f-btn' + (on?' on':''); b.textContent = label; b.dd = dd;
  parent.appendChild(b); return b;
}

function render_planets(container) {
  const p = document.createElement('p');
  p.style.cssText = 'color:#888;font-size:.82em;margin-bottom:12px;';
  p.textContent = '每张星球卡对应一种牌型，使用时牌型提升 1 级。点击查看完整数值递进。';
  container.appendChild(p);
  const grid = document.createElement('div'); grid.className='grid cols-3';
  grid.innerHTML = PLANETS.map((pl, i) => {
    const l3c = pl.c + 3*pl.g, l3m = pl.m + 3*pl.mg;
    return `<div class="p-card" data-idx="${i}">
      <div class="pn">🪐 ${pl.n} <span style="color:#888;font-weight:normal;font-size:.82em">— ${pl.h}</span></div>
      <div class="pf">${pl.c}+${pl.g}×Lv chips | ${pl.m}+${pl.mg}×Lv mult</div>
      <div class="pl">Lv.1:${pl.c}+${pl.m}  Lv.2:${pl.c+pl.g}+${pl.m+pl.mg}  Lv.3:${l3c}+${l3m}</div>
      <div class="ph">💰 $${pl.p} · 🖱️ 点击看详情</div>
    </div>`;
  }).join('');
  grid.addEventListener('click', e => {
    const card = e.target.closest('.p-card');
    if (!card) return;
    const idx = parseInt(card.dataset.idx);
    if (!isNaN(idx)) showPlanetModal(idx);
  });
  container.appendChild(grid);
}

function showPlanetModal(idx) {
  const p = PLANETS[idx]; if (!p) return;
  const c = document.getElementById('modalContent');
  let rows = '';
  for (let lv = 1; lv <= 10; lv++) {
    const ch = p.c + (lv-1)*p.g, mu = p.m + (lv-1)*p.mg;
    rows += `<tr class="${lv<=3?'hl':''}"><td>Lv.${lv}</td><td>${ch}</td><td>${mu}</td><td>${ch*mu}</td></tr>`;
  }
  const kws = [p.h];
  if (p.h==='高牌') kws.push('单张','散牌');
  if (p.h==='对子') kws.push('对子');
  if (p.h==='两对') kws.push('两对');
  if (p.h==='三条') kws.push('三条');
  if (p.h==='顺子') kws.push('顺');
  if (p.h==='同花') kws.push('同花');
  if (p.h==='葫芦') kws.push('葫芦');
  if (p.h==='四条') kws.push('四条');
  if (p.h==='同花顺') kws.push('同花顺');
  if (p.h==='五条') kws.push('五条');
  if (p.h==='同花葫芦') kws.push('同花葫芦');
  if (p.h==='同花五条') kws.push('同花五条');

  const rel = JOKERS.filter(j => kws.some(k => (j.e+j.n).includes(k)));
  const catC = {chips:'var(--chips)',mult:'var(--mult)',xmult:'var(--xmult)',economy:'var(--economy)',deck:'var(--deck)',gen:'var(--gen)',control:'var(--control)',retrigger:'var(--retrigger)',special:'var(--special)',copy:'var(--copy)'};
  c.innerHTML = `<h2>🪐 ${p.n}</h2><div class="ms">${p.h} · 基础 ${p.c}+${p.g}/Lv chips · ${p.m}+${p.mg}/Lv mult · 💰 $${p.p}</div>
    <table class="lvt"><thead><tr><th>等级</th><th>筹码</th><th>倍率</th><th>chips×mult</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="rl">🎪 关联小丑牌 (${rel.length})</div>
    <div class="rt">${rel.map(j => `<span style="border-color:${catC[j.c]||'#555'}">${j.n}</span>`).join('')}</div>`;
  document.getElementById('modal').classList.add('show');
}
